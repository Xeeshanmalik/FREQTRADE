services:
  freqtrade:
    image: freqtradeorg/freqtrade:stable
    restart: always
    container_name: freqtrade
    volumes:
      - "./user_data:/freqtrade/user_data"
    ports:
      - "127.0.0.1:8080:8080"
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    entrypoint: /bin/bash
    command: -c "pip install google-generativeai && freqtrade trade --logfile /freqtrade/user_data/logs/freqtrade.log --db-url sqlite:////freqtrade/user_data/tradesv3.sqlite --config /freqtrade/user_data/config.json --strategy GeminiHybridStrategy"
